{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="step-indicator">
            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Step 1: How are you feeling?</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for radio in form.mood %}
                        <div class="form-check mood-option mood-{{ radio.data.value }}" onclick="this.querySelector('input').click();">
                            {{ radio.tag }}
                            <label class="form-check-label w-100" for="{{ radio.id_for_label }}">
                                {{ radio.choice_label }}
                            </label>
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Next</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .form-check {
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        transition: transform 0.2s;
    }
    .form-check:hover {
        transform: scale(1.02);
    }
    .form-check input {
        display: none;
    }
    .form-check input:checked + label {
        font-weight: bold;
    }
    .form-check label {
        cursor: pointer;
        margin: 0;
        text-align: center;
        color: white;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
</style>
{% endblock %}
